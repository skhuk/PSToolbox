name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PSScriptAnalyzer + Pester (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PSScriptAnalyzer
        shell: powershell
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path .\Modules -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
          }
          $findings = @($results | Where-Object { $_.Severity -in @('Error', 'Warning') })
          if ($findings.Count -gt 0) {
            Write-Host "::error::PSScriptAnalyzer: $($findings.Count) Findings mit Severity Warning/Error."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: keine Findings mit Severity Warning/Error."

      - name: Pester-Tests
        shell: powershell
        run: |
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0
          Import-Module Pester -MinimumVersion 5.5.0
          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  test-pwsh:
    name: Pester (PowerShell 7 / Core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Deckt die Core-Edition-Pfade ab (u.a. den Add-Type-Zweig in
      # Initialize-PSToolboxDelimitedDataReaderType sowie die auf
      # IDbConnection/IDbTransaction umgestellten Parametertypen), OHNE
      # Microsoft.Data.SqlClient zu installieren -- die Tests decken bewusst
      # nur SqlConnection-unabhaengige Logik ab (siehe tests/*.Tests.ps1),
      # Resolve-PSToolboxSqlClientTypes Core-Aufloesung bleibt hier
      # ungetestet (siehe TODO.md, Integrationstests-Punkt).
      - name: Pester-Tests (pwsh)
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0
          Import-Module Pester -MinimumVersion 5.5.0
          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  notify-zenzy:
    name: Notify zenzy submodule update
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository_dispatch to zenzy
        shell: bash
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/skhuk/zenzy/dispatches \
            -d '{"event_type":"pstoolbox-updated"}'

  notify-gfpc:
    name: Notify GFPC submodule update
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository_dispatch to GFPC
        shell: bash
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/skhuk/gfpc/dispatches \
            -d '{"event_type":"pstoolbox-updated"}'
